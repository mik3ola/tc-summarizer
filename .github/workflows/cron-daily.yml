name: Daily cron jobs

on:
  schedule:
    # Run daily at 6:00 AM UTC
    - cron: "0 6 * * *"

  workflow_dispatch:
    # Allows manual run from GitHub Actions tab

jobs:
  cron:
    runs-on: ubuntu-latest
    steps:
      - name: Process expired downgrades
        run: |
          curl -sSf -X POST \
            "https://rsxvxezucgczesplmjiw.supabase.co/functions/v1/process-expired-downgrades" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            -d "{}"

      - name: Process hard deletions
        run: |
          curl -sSf -X POST \
            "https://rsxvxezucgczesplmjiw.supabase.co/functions/v1/process-hard-deletions" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            -d "{}"
