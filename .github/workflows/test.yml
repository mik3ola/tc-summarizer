name: Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run all tests in Docker
        run: |
          docker build -f Dockerfile.test -t termsdigest-test .
          docker run --rm termsdigest-test
